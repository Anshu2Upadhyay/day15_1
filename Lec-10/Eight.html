<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let user = {
            name: "Robin",
            Rollno: 7,
            branch: "AIML",
            address : {
                area:"Nuka Vihar",
                city: "Raxaul",
                Sate: "Bihar",
            }}
            let user1 = user;
            user1.name = "Robin Yadav";
            console.log(user1);
            console.log(user);
            // shallow copy -> copy the outermost attibutuion of the objcet
            let user2 = {
                ...user
            };
            user2.name = "Robin Sunder";
            console.log(user2);
            console.log(user);

            user2.address.city = "Himachal Pradesh";
            console.log(user2);
            console.log(user);

            // Deep copy
            let temp = JSON.stringify(user); // JASON to string
            let user3 = JSON.parse(temp); // String to JSON object

            user3.address.city = "agra";
            console.log(user3);
            console.log(user);

            let user4 = structuredClone(user);
            user4.address.city = "andhra Pradesh";
            console.log(user4);
            console.log(user);
    </script>
</body>
</html>
