<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, serif;
}

body{
    background:#0b5c6d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    font-size:55px;
    margin-bottom:25px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.field{
    width:45%;
    display:flex;
    align-items:center;
}

.field label{
    width:140px;
    font-size:18px;
}

input[type="text"],
input[type="email"],
input[type="date"],
input[type="number"],
input[type="password"],
select{
    width:180px;
    height:28px;
    padding:4px;
}

.full-row{
    margin:20px 0;
    font-size:18px;
}

.full-row label{
    margin-right:15px;
}

.buttons{
    text-align:center;
    margin-top:30px;
}

button{
    background:#e65c00;
    color:white;
    border:none;
    padding:10px 50px;
    margin:0 10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#cc5200;
}
</style>

</head>
<body>

<div class="container">

    <h1>Application Form</h1>

    <div class="row">
        <div class="field">
            <label>First Name:</label>
            <input type="text">
        </div>

        <div class="field">
            <label>Last Name:</label>
            <input type="text">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Date of Birth:</label>
            <input type="date">
        </div>

        <div class="field">
            <label>Age:</label>
            <input type="number">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Gender:</label>
            <select>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="field">
            <label>Email Address:</label>
            <input type="email" placeholder="Enter email address">
        </div>
    </div>

    <div class="full-row">
        <label>Positions Available:</label>

        <input type="radio" name="position"> Junior Developer

        <input type="radio" name="position" style="margin-left:15px;">
        Mid-level Developer

        <input type="radio" name="position" style="margin-left:15px;">
        Senior Developer
    </div>

    <div class="full-row">
        <label>Programming Languages:</label>

        <input type="checkbox"> Java

        <input type="checkbox" style="margin-left:15px;">
        JavaScript

        <input type="checkbox" style="margin-left:15px;">
        Python
    </div>

    <div class="row">
        <div class="field">
            <label>Password:</label>
            <input type="password">
        </div>

        <div class="field">
            <label>Confirm Password:</label>
            <input type="password">
        </div>
    </div>

    <div class="buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</div>

</body>
</html>
